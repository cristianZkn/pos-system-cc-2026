name: Trigger auto deployment for pos-backend-api

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - '**'
    - '.github/workflows/pos-backend-api-AutoDeployTrigger-54f3ed05-fefc-4156-83e7-317abb708023.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.POSBACKENDAPI_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.POSBACKENDAPI_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.POSBACKENDAPI_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}/backend
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: posregistro2026.azurecr.io
          registryUsername: ${{ secrets.POSBACKENDAPI_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.POSBACKENDAPI_REGISTRY_PASSWORD }}
          containerAppName: pos-backend-api
          resourceGroup: pos-pyme-rg
          imageToBuild: posregistro2026.azurecr.io/pos-backend-api:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_


