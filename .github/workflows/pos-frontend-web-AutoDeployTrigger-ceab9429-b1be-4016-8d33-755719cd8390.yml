name: Trigger auto deployment for pos-frontend-web

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - '**'
    - '.github/workflows/pos-frontend-web-AutoDeployTrigger-ceab9429-b1be-4016-8d33-755719cd8390.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.POSFRONTENDWEB_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.POSFRONTENDWEB_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.POSFRONTENDWEB_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}frontend
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: posregistro2026.azurecr.io
          registryUsername: ${{ secrets.POSFRONTENDWEB_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.POSFRONTENDWEB_REGISTRY_PASSWORD }}
          containerAppName: pos-frontend-web
          resourceGroup: pos-pyme-rg
          imageToBuild: posregistro2026.azurecr.io/pos-frontend-web:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_


